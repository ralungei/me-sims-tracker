name: MySimsLife
options:
  bundleIdPrefix: com.mysims
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  MySimsLife:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: MySimsLife
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mysims.life
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "My Sims Life"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.lifestyle"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: MySimsLife/MySimsLife.entitlements
        INFOPLIST_KEY_UIBackgroundModes: [remote-notification]
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O

schemes:
  MySimsLife:
    build:
      targets:
        MySimsLife: all
    run:
      config: Debug
    archive:
      config: Release
